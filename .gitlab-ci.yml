# GitLab CI/CD：仅在推送 tag 时触发构建、打包与镜像发布
# Tag 规范：vx.y.z（如 v1.0.0）
# 版本号、镜像 tag、安装包版本均以 tag 为准
#
# 配置：在 Settings -> CI/CD -> Variables 中设置 GITLAB_TOKEN（api scope，Protected + Masked）

stages:
  - release
  - docker

# 仅当推送 tag 且匹配 vx.y.z 时运行
workflow:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/

# ------------------------------------------------------------------------------
# Release：GoReleaser 交叉编译、RPM/DEB、归档，并创建 GitLab Release（含附件）
# ------------------------------------------------------------------------------
release:
  stage: release
  image:
    name: goreleaser/goreleaser:latest
    entrypoint: [""]
  script:
    - goreleaser release --clean
  variables:
    GORELEASER_CURRENT_TAG: $CI_COMMIT_TAG
  # 需在项目 Variables 中配置 GITLAB_TOKEN（Project/Personal Access Token，scope: api）

# ------------------------------------------------------------------------------
# Docker：构建前后端一体镜像并推送到 GitLab Container Registry
# ------------------------------------------------------------------------------
docker:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - export VERSION=$(echo $CI_COMMIT_TAG | sed 's/^v//')
    - docker build -f deploy/Dockerfile --build-arg VERSION=$VERSION -t $CI_REGISTRY_IMAGE:$VERSION -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:$VERSION
    - docker push $CI_REGISTRY_IMAGE:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/
