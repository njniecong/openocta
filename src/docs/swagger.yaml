  /install:
    post:
      consumes:
      - application/json
      description: 从官网安装数字员工/技能/MCP 插件，下载 zip 并解压保存到本地，自动写入 type 和 from 标识
      parameters:
      - description: '{"kind":"employee|skill|mcp","id":"数字员工id/技能folder/MCP id","type":"分类(可选)","category":"分类(可选,同type)"}'
        in: body
        name: body
        required: true
        schema:
          type: object
          required:
          - kind
          - id
          properties:
            kind:
              type: string
              enum:
              - employee
              - skill
              - mcp
              description: 插件类型
            id:
              type: string
              description: 数字员工 id（数字）、技能 folder、MCP id（数字）
            type:
              type: string
              description: 分类/类型，用于标识
            category:
              type: string
              description: 同 type，兼容
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
            properties:
              ok:
                type: boolean
              id:
                type: string
                description: 安装后的本地 id/folder
              kind:
                type: string
                enum:
                - employee
                - skill
                - mcp
        "400":
          description: Bad Request
          schema:
            type: object
            properties:
              ok:
                type: boolean
              error:
                type: string
        "502":
          description: Bad Gateway（官网连接失败）
          schema:
            type: object
            properties:
              ok:
                type: boolean
              error:
                type: string
      summary: 安装官网插件
      tags:
      - install
