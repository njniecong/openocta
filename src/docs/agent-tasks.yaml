# 多 Agent 任务分配 — 机器可解析格式
# 用于 CI/CD 或脚本检查任务状态

agents:
  B: { phase: 2, name: Gateway 协议层 }
  C: { phase: 3, name: Agent 核心 }
  D: { phase: 4, name: 通道层 }
  E: { phase: 5, name: 插件扩展 }
  F1: { phase: 6, name: Auto-Reply/Routing/Pairing/Infra/Media }
  F2: { phase: 6, name: Hooks/ACP }
  F3: { phase: 6, name: Cron/Memory }
  G: { phase: 7, name: CLI }
  H: { phase: 8, name: 集成 }

batches:
  - id: batch1
    depends_on: ["phase0"]
    tasks:
      - id: T2-1
        agent: B
        desc: "WebSocket 协议帧、握手"
        src: "src/gateway/protocol/"
        dst: "src_go/pkg/gateway/protocol/"
        status: pending
      - id: T2-2
        agent: B
        desc: "HTTP 路由、auth"
        src: "src/gateway/server-http.ts"
        dst: "src_go/pkg/gateway/http/"
        status: pending
      - id: T3-1
        agent: C
        desc: "引入 agentsdk-go"
        src: ""
        dst: "src_go/pkg/agent/runtime.go"
        status: pending
      - id: T7-1
        agent: G
        desc: "Cobra 根命令"
        src: "src/cli/program/build-program.ts"
        dst: "src_go/cmd/openclaw/root.go"
        status: pending

  - id: batch2
    depends_on: ["batch1"]
    tasks:
      - id: T4-1
        agent: D
        desc: "channels-core"
        src: "src/channels/"
        dst: "src_go/pkg/channels/"
        status: pending
      - id: T5-1
        agent: E
        desc: "plugin-sdk"
        src: "src/plugin-sdk/"
        dst: "src_go/pkg/plugin-sdk/"
        status: pending

  - id: batch3
    depends_on: ["batch1"]
    tasks:
      - id: T6-F1-1
        agent: F1
        desc: "routing"
        src: "src/routing/"
        dst: "src_go/pkg/routing/"
        status: pending
      - id: T6-F2-1
        agent: F2
        desc: "hooks-core"
        src: "src/hooks/"
        dst: "src_go/pkg/hooks/"
        status: pending
      - id: T6-F3-1
        agent: F3
        desc: "cron"
        src: "src/cron/"
        dst: "src_go/pkg/cron/"
        status: pending

  - id: batch4
    depends_on: ["batch1", "batch2", "batch3"]
    tasks:
      - id: T8-1
        agent: H
        desc: "端到端集成"
        status: pending
